<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUBG ARENA PK</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0c10;
            --card: #111318;
            --border: #1e2330;
            --accent: #f5a623;
            --green: #00e676;
            --text: #e8eaf0;
            --muted: #6b7280;
        }

        /* Anti-Highlight & Selection Fix for Mobile */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* Login Screen */
        #login-screen {
            height: 100vh;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #f5a62322, transparent);
        }

        .btn {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            margin-top: 15px;
            width: 80%;
            font-size: 16px;
            text-align: center;
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* Main Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--bg);
            padding-bottom: 80px;
            display: none; /* Hidden by default */
        }

        /* Header */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Oswald'; color: var(--accent); font-weight: 700; font-size: 20px; }

        .wallet-badge {
            background: rgba(245, 166, 35, 0.1);
            border: 1px solid var(--accent);
            padding: 5px 12px;
            border-radius: 8px;
            color: var(--accent);
            font-family: 'Oswald';
            font-weight: 700;
            cursor: pointer;
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, #1a1200, #111318);
            margin: 16px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-info img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); }

        /* Tournament Card */
        .match-card {
            background: var(--card);
            margin: 10px 16px;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Modals (Popups) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 200;
        }

        .modal-content {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: var(--card);
            display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid var(--border);
        }

        .nav-item { color: var(--muted); font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        
        /* WhatsApp Floating Button */
        .wa-btn {
            position: fixed; bottom: 80px; right: 20px;
            background: #25D366; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; text-decoration: none;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            z-index: 150;
        }
    </style>
</head>
