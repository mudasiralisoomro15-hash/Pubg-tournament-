    <style>
        :root {
            --bg: #0a0c10;
            --card: #111318;
            --border: #1e2330;
            --accent: #f5a623;
            --accent-glow: rgba(245, 166, 35, 0.2);
            --green: #00e676;
            --red: #ff1744;
            --blue: #2979ff;
            --text: #e8eaf0;
            --muted: #6b7280;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Rajdhani', sans-serif; 
            display: flex; 
            justify-content: center; 
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            position: relative;
            background: var(--bg);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wallet-badge {
            background: var(--accent-glow);
            border: 1px solid rgba(245, 166, 35, 0.3);
            border-radius: 8px;
            padding: 4px 12px;
            color: var(--accent);
            font-weight: 800;
            font-family: 'Oswald', sans-serif;
        }

        /* Hero Banner */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin: 16px;
        }

        .hero-banner {
            background: linear-gradient(135deg, #1a1200, #0a0c10);
            position: relative;
            overflow: hidden;
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid currentColor;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
        }

        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            max-width: 480px;
            width: 100%;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav-item {
            text-align: center;
            color: var(--muted);
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="logo"><span>🎯</span> PUBG ARENA</div>
            <div class="wallet-badge">₹2,450</div>
        </header>

        <div class="card hero-banner">
            <div style="color: var(--muted); font-size: 11px; letter-spacing: 2px;">WELCOME BACK</div>
            <div style="font-family: 'Oswald', sans-serif; font-size: 24px; margin-bottom: 10px;">ProSniper_99 ✦</div>
            <div style="display: flex; gap: 8px;">
                <span class="badge" style="color: var(--blue);">💎 DIAMOND</span>
                <span class="badge" style="color: var(--muted);">UID: PUBG-7842</span>
            </div>
            <div style="margin-top: 20px; background: rgba(245,166,35,0.05); padding: 12px; border-radius: 10px; border: 1px solid rgba(245,166,35,0.2);">
                <div style="font-size: 10px; color: var(--muted);">WALLET BALANCE</div>
                <div style="font-size: 28px; font-weight: 800; color: var(--accent); font-family: 'Oswald';">₹2,450</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div style="font-size: 20px;">🏆</div>
                <div style="font-family: 'Oswald'; font-size: 20px;">24</div>
                <div style="font-size: 10px; color: var(--muted);">MATCHES</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 20px;">💰</div>
                <div style="font-family: 'Oswald'; font-size: 20px;">₹12,400</div>
                <div style="font-size: 10px; color: var(--muted);">EARNINGS</div>
            </div>
        </div>

        <div style="padding: 16px;">
            <h3 style="font-family: 'Oswald'; color: var(--accent); letter-spacing: 2px; margin-bottom: 15px; font-size: 16px;">🔥 LIVE TOURNAMENTS</h3>
            
            <div class="card" style="margin: 0 0 12px 0; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-weight: 700;">Erangel Classic</div>
                    <div style="font-size: 11px; color: var(--muted); margin: 4px 0;">🗺 Erangel • ⏰ 8:00 PM</div>
                    <span class="badge" style="color: var(--gold); border-color: var(--gold);">Prize ₹5,000</span>
                </div>
                <button style="background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; cursor: pointer;">JOIN</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active"><i>🏠</i>Home</div>
            <div class="nav-item"><i>⚔️</i>Matches</div>
            <div class="nav-item"><i>📋</i>History</div>
            <div class="nav-item"><i>👤</i>Profile</div>
        </nav>
    </div>

</body>
</html>
